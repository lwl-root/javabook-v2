# ============================================================================
#  Decap CMS 配置文件 (https://decapcms.org/docs/configuration/)
#  零服务器 / 免费 / GitHub 登录 (PKCE)
# ============================================================================
backend:
  name: github
  repo: lwl-root/javabook-v2
  branch: master
  # auth_type: pkce            # 无需后端服务器，浏览器直连 GitHub
  base_url: https://javabook-v2.vercel.app
  auth_endpoint: /api/auth
  # app_id: Ov23lifuEMc8b0w1spFY # ← 部署后请替换为你在 GitHub 创建的 OAuth App Client ID

# 站点部署后的访问地址（Vercel 域名），用于 OAuth 回调
# 如果使用了自定义域名，请改成你的域名
site_url: https://javabook-v2.vercel.app

# CMS 后台显示语言
locale: zh_Hans

# 发布时自动生成提交信息
#publish_mode: editorial_workflow

# 媒体资源（图片等）存放目录，与 VuePress 的 public 目录保持一致
media_folder: docs/.vuepress/public/images
public_folder: /images

# ----------------------------------------------------------------------------
#  内容集合：与 docs 目录结构一一对应
#  每篇文章 = docs/<section>/<module>/notes/<file>.md
# ----------------------------------------------------------------------------
collections:
  # ===================== 工具库 =====================
  - name: utilse_guava
    label: "工具库 / Guava"
    folder: docs/utilse/guava/notes
    create: true
    slug: "{{slug}}"
    extension: md
    summary: "{{fields.title}} ({{slug}})"
    fields:
      - { label: "标题", name: title, widget: string }
      - { label: "正文", name: body, widget: markdown }

